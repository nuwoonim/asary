<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asary - 기업 인력 데이터</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-body: #0a0a0a;
            --bg-card: #141414;
            --bg-hover: #1a1a1a;
            --border: #2a2a2a;
            --text-main: #eee;
            --text-sub: #888;
            --primary: #ff6b35;
            --primary-light: rgba(255, 107, 53, 0.15);
            --info: #4a9eff;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-body); color: var(--text-main); min-height: 100vh; }
        .layout-container { display: flex; min-height: 100vh; }
        .sidebar-left { width: 240px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 20px; position: fixed; height: 100vh; overflow-y: auto; }
        .logo-area { padding: 10px 0 30px; }
        .logo-area a { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-main); }
        .logo-icon { font-size: 24px; }
        .logo-text { font-size: 18px; font-weight: bold; }
        .nav-group { margin-bottom: 20px; }
        .drawer-section-title { font-size: 11px; color: var(--text-sub); margin-bottom: 10px; padding-left: 10px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 10px; color: var(--text-sub); text-decoration: none; border-radius: 8px; transition: 0.2s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: var(--bg-hover); color: var(--text-main); }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 16px; }
        .main-content { flex: 1; margin-left: 240px; padding: 40px; }
        .search-hero { text-align: center; padding: 60px 20px 40px; }
        .hero-title { font-size: 32px; margin-bottom: 30px; }
        .hero-highlight { color: var(--primary); }
        .search-box-wrapper { max-width: 700px; margin: 0 auto; display: flex; gap: 10px; }
        .search-input { flex: 1; padding: 14px 20px; font-size: 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; color: var(--text-main); outline: none; }
        .search-input:focus { border-color: var(--primary); }
        .search-input::placeholder { color: var(--text-sub); }
        .stockcode-input { width: 150px; padding: 14px 16px; font-size: 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; color: var(--text-main); outline: none; }
        .search-btn { padding: 14px 24px; font-size: 16px; background: var(--primary); border: none; border-radius: 12px; color: white; cursor: pointer; }
        .search-btn:hover { opacity: 0.9; }
        .filter-section { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; border-radius: 20px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-sub); font-size: 13px; cursor: pointer; transition: 0.2s; }
        .filter-btn:hover { background: var(--bg-hover); color: var(--text-main); }
        .filter-btn.active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 40px 0; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .stat-label { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .stat-value.primary { color: var(--primary); }
        .stat-value.male { color: #6ab7ff; }
        .stat-value.female { color: #ff9ecd; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 5px; }
        .results-count { font-size: 14px; color: var(--text-sub); }
        .results-count strong { color: var(--primary); font-size: 18px; }
        .sort-options { display: flex; gap: 8px; }
        .sort-btn { padding: 8px 14px; border-radius: 8px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-sub); font-size: 13px; cursor: pointer; transition: 0.2s; }
        .sort-btn:hover { background: var(--bg-hover); color: var(--text-main); }
        .sort-btn.active { background: linear-gradient(135deg, #1f1f1f, #141414); border-color: var(--primary); color: var(--primary); }
        .results-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(500px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .company-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
        .company-card:hover { transform: translateY(-2px); border-color: var(--primary); }
        .company-header { display: flex; gap: 15px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
        .company-logo { font-size: 36px; width: 60px; height: 60px; background: var(--bg-hover); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .company-info { flex: 1; }
        .company-name { font-size: 18px; font-weight: bold; margin-bottom: 6px; }
        .company-meta { display: flex; gap: 12px; font-size: 13px; color: var(--text-sub); }
        .market-badge { display: inline-block; padding: 4px 10px; background: var(--primary-light); color: var(--primary); border-radius: 12px; font-size: 12px; font-weight: 600; }
        .market-badge.kospi { background: rgba(74, 158, 255, 0.15); color: var(--info); }
        .data-section { margin-top: 12px; }
        .data-section-title { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .data-item { background: var(--bg-hover); padding: 10px 12px; border-radius: 8px; }
        .data-label { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
        .data-value { font-size: 14px; font-weight: 600; }
        .data-value.male { color: #6ab7ff; }
        .data-value.female { color: #ff9ecd; }
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 40px; padding-bottom: 40px; }
        .page-btn { padding: 10px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text-sub); cursor: pointer; transition: 0.2s; }
        .page-btn:hover { background: var(--bg-hover); color: var(--text-main); }
        .page-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .no-results { text-align: center; padding: 80px 20px; background: var(--bg-card); border-radius: 20px; border: 1px dashed var(--border); }
        .no-results-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.3; }
        .no-results h3 { font-size: 24px; margin-bottom: 15px; color: var(--text-sub); }
        .no-results p { color: #666; font-size: 14px; }
        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; color: var(--text-sub); }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-title { font-size: 24px; font-weight: bold; }
        .modal-close { background: none; border: none; color: var(--text-sub); font-size: 28px; cursor: pointer; }
        .modal-close:hover { color: var(--text-main); }
        .error-msg { background: #3a1a1a; border: 1px solid #ff4444; padding: 20px; border-radius: 12px; text-align: center; margin: 40px 0; }
        .error-msg h3 { color: #ff6666; margin-bottom: 10px; }
        .error-msg p { color: #888; }
        @media (max-width: 1024px) { .sidebar-left { display: none; } .main-content { margin-left: 0; padding: 20px; } .results-container { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .search-box-wrapper { flex-direction: column; } .stockcode-input { width: 100%; } .stats-container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="layout-container">
        <aside class="sidebar-left">
            <div class="logo-area">
                <a href="./index.html"><span class="logo-icon">🏢</span><span class="logo-text">Asary</span></a>
            </div>
            <nav class="nav-menu">
                <div class="nav-group">
                    <div class="drawer-section-title">MENU</div>
                    <a href="./index.html" class="nav-item active"><span class="nav-icon">🔍</span> 기업 검색</a>
                    <a href="./stats.html" class="nav-item"><span class="nav-icon">📊</span> 통계 현황</a>
                    <a href="./gender-top10.html" class="nav-item"><span class="nav-icon">⚖️</span> 남초/여초 TOP10</a>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <section class="search-hero">
                <h1 class="hero-title">기업 <span class="hero-highlight">인력 데이터</span> 검색</h1>
                <div class="search-box-wrapper">
                    <input type="text" class="search-input" id="searchInput" placeholder="회사명을 입력하세요">
                    <input type="text" class="stockcode-input" id="stockCodeInput" placeholder="종목코드">
                    <button class="search-btn" id="searchBtn">🔍</button>
                </div>
                <div class="filter-section">
                    <button class="filter-btn active" data-market="">전체</button>
                    <button class="filter-btn" data-market="Q">코스닥</button>
                    <button class="filter-btn" data-market="I">유가증권</button>
                </div>
            </section>

            <div class="stats-container" id="statsContainer">
                <div class="stat-card"><div class="stat-label">전체 기업 수</div><div class="stat-value primary" id="statTotalCompanies">-</div></div>
                <div class="stat-card"><div class="stat-label">전체 직원 수</div><div class="stat-value" id="statTotalEmployees">-</div></div>
                <div class="stat-card"><div class="stat-label">남성 전체 직원</div><div class="stat-value male" id="statTotalMaleEmployees">-</div></div>
                <div class="stat-card"><div class="stat-label">여성 전체 직원</div><div class="stat-value female" id="statTotalFemaleEmployees">-</div></div>
                <div class="stat-card"><div class="stat-label">남성 평균 급여</div><div class="stat-value male" id="statAvgMaleSalary">-</div></div>
                <div class="stat-card"><div class="stat-label">여성 평균 급여</div><div class="stat-value female" id="statAvgFemaleSalary">-</div></div>
            </div>
            <div id="errorContainer"></div>

            <div class="results-header">
                <div class="results-count">검색 결과 <strong id="resultCount">0</strong>개</div>
                <div class="sort-options">
                    <button class="sort-btn active" data-sort="회사명">가나다순</button>
                    <button class="sort-btn" data-sort="남합계">남성인원순</button>
                    <button class="sort-btn" data-sort="여합계">여성인원순</button>
                </div>
            </div>

            <div class="results-container" id="resultsContainer">
                <div class="no-results">
                    <div class="no-results-icon">🔍</div>
                    <h3>검색어를 입력하세요</h3>
                    <p>회사명 또는 종목코드로 검색할 수 있습니다.</p>
                </div>
            </div>

            <div class="pagination" id="pagination"></div>

            <div style="margin-top: 40px; padding: 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; font-size: 13px; color: var(--text-sub);">
                <div style="margin-bottom: 8px;"><strong>자료출처 :</strong> <a href="https://opendart.fss.or.kr/disclosureinfo/biz/main.do" target="_blank" style="color: var(--primary); text-decoration: none;">opendart</a></div>
                <div style="color: #ff6b6b;">* 통계 데이터에서 제외: 007700, 271830 (종목코드) / 급여 및 인원이 0이거나 NULL인 데이터</div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">회사명</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script type="module">
        import { initData, getStats, searchCompanies, getCompany } from './js/data.js';

        let currentPage = 1;
        let currentMarket = '';
        let currentSort = '회사명';
        let dataLoaded = false;

        function formatNumber(num) {
            return num ? parseInt(num).toLocaleString('ko-KR') : '0';
        }
        function formatCurrency(num) {
            return num ? parseInt(num).toLocaleString('ko-KR') + '원' : '0원';
        }

        function showError(msg) {
            document.getElementById('errorContainer').innerHTML = `<div class="error-msg"><h3>⚠️ 오류</h3><p>${msg}</p></div>`;
        }

        function updateStats() {
            const stats = getStats();
            if (!stats) {
                showError('데이터를 불러올 수 없습니다. data.json 파일을 확인해주세요.');
                return;
            }
            document.getElementById('statTotalCompanies').textContent = formatNumber(stats.totalCompanies);
            document.getElementById('statTotalEmployees').textContent = formatNumber(stats.totalEmployees) + '명';
            document.getElementById('statTotalMaleEmployees').textContent = formatNumber(stats.totalMale) + '명';
            document.getElementById('statTotalFemaleEmployees').textContent = formatNumber(stats.totalFemale) + '명';
            document.getElementById('statAvgMaleSalary').textContent = formatCurrency(stats.avgMaleSalary);
            document.getElementById('statAvgFemaleSalary').textContent = formatCurrency(stats.avgFemaleSalary);
        }

        function search() {
            const searchText = document.getElementById('searchInput').value.trim();
            const stockCode = document.getElementById('stockCodeInput').value.trim();
            const container = document.getElementById('resultsContainer');

            container.innerHTML = `<div class="loading"><div class="spinner"></div><p>데이터를 불러오는 중...</p></div>`;

            setTimeout(() => {
                const result = searchCompanies(searchText, stockCode, currentMarket, currentSort, currentPage, 20);

                if (result.total === 0) {
                    container.innerHTML = `<div class="no-results"><div class="no-results-icon">🔍</div><h3>검색 결과가 없습니다</h3><p>다른 검색어를 시도해보세요.</p></div>`;
                    document.getElementById('resultCount').textContent = 0;
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                document.getElementById('resultCount').textContent = result.total;
                renderResults(result.data);
                renderPagination(result.totalPages);
            }, 10);
        }

        function renderResults(rows) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = rows.map(row => {
                const marketLabel = row['시장구분'] === 'Q' ? '코스닥' : '유가증권';
                const marketClass = row['시장구분'] === 'I' ? 'kospi' : 'kosdaq';
                return `
                    <div class="company-card" onclick="showDetail('${row['종목코드']}')">
                        <div class="company-header">
                            <div class="company-logo">🏢</div>
                            <div class="company-info">
                                <div class="company-name">${row['회사명']}</div>
                                <div class="company-meta">
                                    <span>종목코드 ${row['종목코드']}</span>
                                    <span class="market-badge ${marketClass}">${marketLabel}</span>
                                    <span>${row['연도']}년</span>
                                </div>
                            </div>
                        </div>
                        <div class="data-section">
                            <div class="data-section-title">👨 남성 데이터</div>
                            <div class="data-grid">
                                <div class="data-item"><div class="data-label">정규직</div><div class="data-value male">${formatNumber(row['남정규직'])}명</div></div>
                                <div class="data-item"><div class="data-label">기간제</div><div class="data-value male">${formatNumber(row['남기간제'])}명</div></div>
                                <div class="data-item"><div class="data-label">합계</div><div class="data-value male">${formatNumber(row['남합계'])}명</div></div>
                                <div class="data-item"><div class="data-label">평균근속</div><div class="data-value male">${row['남평균근속개월수_추정']}개월</div></div>
                                <div class="data-item"><div class="data-label">연간급여총액</div><div class="data-value male">${formatCurrency(row['남연간급여총액'])}</div></div>
                                <div class="data-item"><div class="data-label">1인평균급여</div><div class="data-value male">${formatCurrency(row['남_1인평균급여액'])}</div></div>
                            </div>
                        </div>
                        <div class="data-section">
                            <div class="data-section-title">👩 여성 데이터</div>
                            <div class="data-grid">
                                <div class="data-item"><div class="data-label">정규직</div><div class="data-value female">${formatNumber(row['여정규직'])}명</div></div>
                                <div class="data-item"><div class="data-label">기간제</div><div class="data-value female">${formatNumber(row['여기간제'])}명</div></div>
                                <div class="data-item"><div class="data-label">합계</div><div class="data-value female">${formatNumber(row['여합계'])}명</div></div>
                                <div class="data-item"><div class="data-label">평균근속</div><div class="data-value female">${row['여평균근속개월수_추정']}개월</div></div>
                                <div class="data-item"><div class="data-label">연간급여총액</div><div class="data-value female">${formatCurrency(row['여연간급여총액'])}</div></div>
                                <div class="data-item"><div class="data-label">1인평균급여</div><div class="data-value female">${formatCurrency(row['여_1인평균급여액'])}</div></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">←</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                }
            }
            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">→</button>`;
            container.innerHTML = html;
        }

        window.goToPage = function(page) {
            if (page < 1) return;
            currentPage = page;
            search();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.showDetail = function(stockCode) {
            const company = getCompany(stockCode);
            if (!company) return;
            document.getElementById('modalTitle').textContent = company['회사명'];
            const totalEmp = (parseInt(company['남합계']) || 0) + (parseInt(company['여합계']) || 0);
            const totalSal = (parseInt(company['남연간급여총액']) || 0) + (parseInt(company['여연간급여총액']) || 0);
            document.getElementById('modalBody').innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 30px;">
                    <div class="stat-card"><div class="stat-label">종목코드</div><div class="stat-value">${company['종목코드']}</div></div>
                    <div class="stat-card"><div class="stat-label">시장구분</div><div class="stat-value">${company['시장구분'] === 'Q' ? '코스닥' : '유가증권'}</div></div>
                    <div class="stat-card"><div class="stat-label">전체 직원</div><div class="stat-value">${formatNumber(totalEmp)}명</div></div>
                    <div class="stat-card"><div class="stat-label">1인평균급여</div><div class="stat-value">${formatCurrency(totalEmp > 0 ? Math.round(totalSal / totalEmp) : 0)}</div></div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                    <div>
                        <h3 style="color: #6ab7ff; margin-bottom: 16px;">👨 남성</h3>
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
                            <div class="data-item"><div class="data-label">정규직</div><div class="data-value male">${formatNumber(company['남정규직'])}명</div></div>
                            <div class="data-item"><div class="data-label">기간제</div><div class="data-value male">${formatNumber(company['남기간제'])}명</div></div>
                            <div class="data-item"><div class="data-label">합계</div><div class="data-value male">${formatNumber(company['남합계'])}명</div></div>
                            <div class="data-item"><div class="data-label">평균근속</div><div class="data-value male">${company['남평균근속개월수_추정']}개월</div></div>
                            <div class="data-item"><div class="data-label">연간급여총액</div><div class="data-value male">${formatCurrency(company['남연간급여총액'])}</div></div>
                            <div class="data-item"><div class="data-label">1인평균급여</div><div class="data-value male">${formatCurrency(company['남_1인평균급여액'])}</div></div>
                        </div>
                    </div>
                    <div>
                        <h3 style="color: #ff9ecd; margin-bottom: 16px;">👩 여성</h3>
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
                            <div class="data-item"><div class="data-label">정규직</div><div class="data-value female">${formatNumber(company['여정규직'])}명</div></div>
                            <div class="data-item"><div class="data-label">기간제</div><div class="data-value female">${formatNumber(company['여기간제'])}명</div></div>
                            <div class="data-item"><div class="data-label">합계</div><div class="data-value female">${formatNumber(company['여합계'])}명</div></div>
                            <div class="data-item"><div class="data-label">평균근속</div><div class="data-value female">${company['여평균근속개월수_추정']}개월</div></div>
                            <div class="data-item"><div class="data-label">연간급여총액</div><div class="data-value female">${formatCurrency(company['여연간급여총액'])}</div></div>
                            <div class="data-item"><div class="data-label">1인평균급여</div><div class="data-value female">${formatCurrency(company['여_1인평균급여액'])}</div></div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('detailModal').classList.add('active');
        };

        document.getElementById('searchBtn').addEventListener('click', () => { currentPage = 1; search(); });
        document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') { currentPage = 1; search(); } });
        document.getElementById('stockCodeInput').addEventListener('keypress', e => { if (e.key === 'Enter') { currentPage = 1; search(); } });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMarket = btn.dataset.market;
                currentPage = 1;
                search();
            });
        });

        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSort = btn.dataset.sort;
                currentPage = 1;
                search();
            });
        });

        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('detailModal').classList.remove('active');
        });
        document.getElementById('detailModal').addEventListener('click', e => {
            if (e.target === document.getElementById('detailModal')) {
                document.getElementById('detailModal').classList.remove('active');
            }
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('detailModal').classList.remove('active'); });

        initData().then(ok => {
            if (ok) {
                dataLoaded = true;
                updateStats();
            } else {
                showError('data.json 파일을 불러올 수 없습니다. 서버에서 실행해주세요.');
            }
        });
    </script>
</body>
</html>
